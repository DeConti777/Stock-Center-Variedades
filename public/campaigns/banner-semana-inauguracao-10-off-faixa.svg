<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="220" viewBox="0 0 1440 220" preserveAspectRatio="none" role="img" aria-labelledby="title desc">
  <title id="title">Semana de Inauguracao com 10% OFF em todo o site</title>
  <desc id="desc">Banner promocional horizontal em azul-marinho, preto e dourado para campanha de inauguracao.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#030815"/>
      <stop offset="0.44" stop-color="#071b34"/>
      <stop offset="1" stop-color="#02040a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2a9"/>
      <stop offset="0.45" stop-color="#f0b940"/>
      <stop offset="1" stop-color="#9e6415"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe88e"/>
      <stop offset="1" stop-color="#d49422"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="58%">
      <stop offset="0" stop-color="#f6c64b" stop-opacity=".42"/>
      <stop offset=".42" stop-color="#0b1e38" stop-opacity=".26"/>
      <stop offset="1" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity=".42"/>
    </filter>
  </defs>
  <rect width="1440" height="220" fill="url(#bg)"/>
  <rect width="1440" height="220" fill="url(#glow)"/>
  <g opacity=".22" stroke="#f4c64b" stroke-width="2" fill="none">
    <path d="M0 26 C180 82 310 -10 460 44"/>
    <path d="M978 180 C1120 126 1244 232 1440 166"/>
    <path d="M16 194 C180 132 330 228 498 164"/>
    <path d="M1038 34 C1176 96 1280 -18 1430 48"/>
  </g>
  <g opacity=".16" fill="none" stroke="#ffffff" stroke-width="3">
    <rect x="84" y="64" width="94" height="62" rx="14"/>
    <path d="M105 82 h48 l-7 28 h-32 z"/>
    <circle cx="117" cy="116" r="4"/>
    <circle cx="144" cy="116" r="4"/>
    <path d="M1280 64 h86 l-8 54 h-70 z"/>
    <path d="M1292 82 h52 M1292 98 h44"/>
    <path d="M232 70 l34 -18 34 18 v38 l-34 18 -34 -18 z"/>
    <path d="M258 77 l18 18 M276 77 l-18 18"/>
  </g>
  <g filter="url(#softShadow)" text-anchor="middle">
    <text x="720" y="45" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" letter-spacing="10">SEMANA DE INAUGURAÇĂO</text>
    <text x="612" y="132" fill="url(#gold)" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="104" font-weight="900" letter-spacing="-6">10%</text>
    <text x="835" y="128" fill="#ffffff" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="66" font-weight="900">OFF</text>
    <text x="720" y="164" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="900" letter-spacing="4">EM TODO O SITE</text>
  </g>
  <g transform="translate(600 174)">
    <rect width="240" height="34" rx="17" fill="url(#button)" stroke="#fff0a8" stroke-width="2"/>
    <text x="120" y="23" text-anchor="middle" fill="#081326" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900">COMPRAR AGORA</text>
  </g>
  <g opacity=".88" fill="#f4c64b" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="800">
    <text x="282" y="190">PRODUTOS DE QUALIDADE</text>
    <text x="970" y="190">COMPRA SEGURA</text>
    <text x="1145" y="190">ENVIO RAPIDO</text>
  </g>
</svg>
